# INDUST module configuration — Industrial anomaly detection (PaDiM on MVTec AD)

indust:
  # Currently selected MVTec category. Switch via API or settings page.
  active_category: toothbrush
  model_dir: models/indust

  # Default anomaly score threshold (0.0 = anything is OK, 1.0 = nothing is OK)
  default_threshold: 0.5

  # Per-category settings. Add entries here as you train more PaDiM models.
  # Only categories with a trained .tflite in models/indust/ should be listed —
  # selecting a category without a model raises a runtime error.
  categories:
    toothbrush:
      model: padim_toothbrush.tflite
      input_size: [256, 256]
      threshold: 0.5
      description: "Toothbrush head defect detection"

  # Persistence flags
  save_frames: true
  save_heatmaps: true

  # Segmentation / measurement
  measurement:
    # Minimum contour area (px²) considered a real object
    min_contour_area: 500
    # Pad bounding box by N px when cropping for measurement
    bbox_padding: 8
