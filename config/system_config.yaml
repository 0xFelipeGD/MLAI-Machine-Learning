# MLAI — System Configuration
# Loaded by engine/main.py and api/main.py at startup.
# Edit this file to change system-wide behavior. Restart services after editing.

project:
  name: "Machine Learning for Agriculture (Fruit Inspection)"
  version: "1.0.0"

system:
  hostname: mlai

camera:
  # Capture resolution. Lower = faster, higher = more detail.
  resolution: [640, 480]
  # Target frames per second sent to the inference engine.
  fps: 5
  exposure_mode: auto
  # awb_mode: 'auto' lets picamera2 auto-balance white. 'manual' disables
  # AWB and uses colour_gains below — REQUIRED for NoIR cameras, where the
  # auto-WB compensates for IR contamination by dropping red gain so hard
  # that fruits end up looking blue. With 'manual' + tuned gains, reds and
  # oranges come back close to natural.
  awb_mode: manual
  # Manual red/blue gains (only used when awb_mode is 'manual').
  # Increase first number if reds/oranges look too dim/blue.
  # Decrease second number if everything looks too blue.
  colour_gains: [2.4, 0.5]
  # Use libcamera/picamera2 on Pi; falls back to OpenCV VideoCapture(0) on PC.
  source: auto  # auto | picamera2 | opencv
  # 3x3 color correction matrix applied AFTER the manual gains. Fine-tunes
  # cross-channel bleed (e.g. residual IR red leaking into the green channel).
  # Set to null / comment out to disable. Rows = output R/G/B; columns = input.
  color_matrix:
    - [1.3, -0.2, -0.1]
    - [-0.1, 1.2, -0.1]
    - [-0.2, -0.2, 1.4]

inference:
  # TFLite XNNPACK threads. The Pi 4 has 4 cores.
  num_threads: 4
  log_level: INFO

storage:
  db_path: data/mlai.db
  capture_dir: data/captures
  # Auto-prune captures older than this many days.
  prune_after_days: 30
  # Hard cap on captures directory size in GB.
  max_captures_gb: 5
  # Trigger emergency prune when above this many GB.
  emergency_prune_gb: 8

api:
  host: 0.0.0.0
  port: 8000
  cors_origins:
    - "http://localhost:3000"
    - "http://127.0.0.1:3000"

web:
  port: 3000

mqtt:
  # Future expansion for remote monitoring.
  enabled: false
  broker: ""
  port: 1883
  topic_prefix: mlai/
