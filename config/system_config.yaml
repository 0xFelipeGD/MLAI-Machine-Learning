# MLAI — System Configuration
# Loaded by engine/main.py and api/main.py at startup.
# Edit this file to change system-wide behavior. Restart services after editing.

project:
  name: "Machine Learning for Agriculture (Fruit Inspection)"
  version: "1.0.0"

system:
  hostname: mlai

camera:
  # Capture resolution. Lower = faster, higher = more detail.
  resolution: [640, 480]
  # Target frames per second sent to the inference engine.
  fps: 5
  exposure_mode: auto
  awb_mode: auto
  # Use libcamera/picamera2 on Pi; falls back to OpenCV VideoCapture(0) on PC.
  source: auto  # auto | picamera2 | opencv
  # 3x3 color correction matrix (RGB-space). Applied to every captured frame.
  # Default values below are tuned for the Camera Module 3 NoIR (imx708_noir),
  # which has no IR-cut filter and renders oranges as gray-blue without
  # correction — breaking the COCO-trained fruit detector.
  # Set to null/comment out to disable. Tune empirically for your camera +
  # lighting; rows are output R, G, B; columns are input R, G, B coefficients.
  color_matrix:
    - [1.6, -0.3, -0.3]   # output Red  = 1.6 R - 0.3 G - 0.3 B
    - [-0.2, 1.4, -0.2]   # output Green
    - [-0.3, -0.3, 1.6]   # output Blue

inference:
  # TFLite XNNPACK threads. The Pi 4 has 4 cores.
  num_threads: 4
  log_level: INFO

storage:
  db_path: data/mlai.db
  capture_dir: data/captures
  # Auto-prune captures older than this many days.
  prune_after_days: 30
  # Hard cap on captures directory size in GB.
  max_captures_gb: 5
  # Trigger emergency prune when above this many GB.
  emergency_prune_gb: 8

api:
  host: 0.0.0.0
  port: 8000
  cors_origins:
    - "http://localhost:3000"
    - "http://127.0.0.1:3000"

web:
  port: 3000

mqtt:
  # Future expansion for remote monitoring.
  enabled: false
  broker: ""
  port: 1883
  topic_prefix: mlai/
